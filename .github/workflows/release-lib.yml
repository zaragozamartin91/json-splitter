name: release-lib

on:
  workflow_dispatch: # Allows you to trigger the release manually from the UI
    inputs:
      releaseVersion:
        description: 'Version to release (e.g. 1.1.0)'
        required: true
      nextVersion:
        description: 'Next development version (e.g. 1.2.0-SNAPSHOT)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: allows the bot to push commits and tags
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: fetch all history so Maven can see tags

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
            java-version: '8'
            distribution: 'corretto'
            server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
            settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Configure Git User
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Settings Xml diff
        run: |
          git diff settings.xml

      - name: Prepare Release
        run: |
          # Use GITHUB_TOKEN to allow Maven to push changes
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          mvn -B -s $GITHUB_WORKSPACE/settings.xml release:prepare \
            -DreleaseVersion=${{ github.event.inputs.releaseVersion }} \
            -DdevelopmentVersion=${{ github.event.inputs.nextVersion }}

      - name: Perform Release
        run: |
          mvn -B -s $GITHUB_WORKSPACE/settings.xml release:perform

      - name: Push Changes
        run: |
          git push origin main --tags
